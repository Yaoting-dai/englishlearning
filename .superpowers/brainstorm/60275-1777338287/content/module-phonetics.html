<h2>模块2：音标认读</h2>
<p class="subtitle">适合小学~初中，国际音标 IPA 学习</p>

<div class="section">
  <h3>布局设计：元音 + 辅音分区</h3>
  <div class="mockup">
    <div class="mockup-header">🔊 音标认读</div>
    <div class="mockup-body" style="padding: 16px;">
      <!-- 选项卡 -->
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="background:#E91E63;color:#fff;padding:6px 20px;border-radius:20px;font-size:14px;">元音</div>
        <div style="background:#f0f0f0;color:#666;padding:6px 20px;border-radius:20px;font-size:14px;">辅音</div>
      </div>
      <!-- 单/双元音分组 -->
      <div style="font-size:13px;color:#666;margin-bottom:8px;">单元音</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/iː/</div>
          <div style="font-size:11px;color:#666;">see</div>
        </div>
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/ɪ/</div>
          <div style="font-size:11px;color:#666;">sit</div>
        </div>
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/e/</div>
          <div style="font-size:11px;color:#666;">bed</div>
        </div>
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/æ/</div>
          <div style="font-size:11px;color:#666;">cat</div>
        </div>
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/ʌ/</div>
          <div style="font-size:11px;color:#666;">cup</div>
        </div>
        <div style="background:#FCE4EC;border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:bold;">/ɑː/</div>
          <div style="font-size:11px;color:#666;">car</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>点击音标后的详情</h3>
  <div class="mockup">
    <div class="mockup-body" style="padding: 20px; text-align: center;">
      <div style="font-size: 56px; font-weight: bold; color: #E91E63;">/iː/</div>
      <div style="margin: 8px 0;">
        <span style="background:#4CAF50;color:#fff;padding:6px 16px;border-radius:20px;font-size:14px;">🔊 听发音</span>
        <span style="background:#2196F3;color:#fff;padding:6px 16px;border-radius:20px;font-size:14px;margin-left:8px;">🎤 跟读</span>
      </div>
      <!-- 发音口型说明 -->
      <div style="background:#F3E5F5;border-radius:12px;padding:12px;margin-top:12px;text-align:left;">
        <div style="font-weight:bold;font-size:14px;">👄 发音要领</div>
        <div style="font-size:13px;color:#666;margin-top:4px;">舌尖抵下齿，嘴唇向两侧拉开，微笑状。长音，声音拉长。</div>
      </div>
      <!-- 例词 -->
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="flex:1;background:#E3F2FD;border-radius:10px;padding:10px;">
          <div style="font-size:18px;font-weight:bold;">see</div>
          <div style="font-size:12px;color:#666;">/siː/</div>
        </div>
        <div style="flex:1;background:#E3F2FD;border-radius:10px;padding:10px;">
          <div style="font-size:18px;font-weight:bold;">tree</div>
          <div style="font-size:12px;color:#666;">/triː/</div>
        </div>
        <div style="flex:1;background:#E3F2FD;border-radius:10px;padding:10px;">
          <div style="font-size:18px;font-weight:bold;">green</div>
          <div style="font-size:12px;color:#666;">/ɡriːn/</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="border-top: 1px solid #ddd; margin: 24px 0;"></div>
