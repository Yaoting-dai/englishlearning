<h2>模块1：字母认读 — 滑动卡牌形式</h2>
<p class="subtitle">iPad 左右滑动切换字母，更适合幼儿操作</p>

<div class="section">
  <h3>滑动卡牌设计</h3>
  <div class="mockup">
    <div class="mockup-header">🔤 字母认读 · 3/26</div>
    <div class="mockup-body" style="padding: 20px; text-align: center;">
      <!-- 大卡牌 -->
      <div style="background: linear-gradient(135deg, #FFE0B2, #FFCC80); border-radius: 24px; padding: 32px 20px; margin: 0 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
        <div style="font-size: 80px; font-weight: bold; color: #E65100; line-height: 1;">C</div>
        <div style="font-size: 32px; font-weight: bold; color: #BF360C; margin-top: 4px;">c</div>
        <div style="font-size: 16px; color: #666; margin-top: 8px;">/siː/</div>

        <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; background: rgba(255,255,255,0.6); border-radius: 16px; padding: 12px;">
          <div style="width: 60px; height: 60px; background: #FFE0B2; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 36px;">🐱</div>
          <div style="text-align: left;">
            <div style="font-size: 20px; font-weight: bold;">Cat</div>
            <div style="font-size: 13px; color: #666;">/kæt/ · 猫</div>
          </div>
        </div>
      </div>

      <!-- 控制按钮 -->
      <div style="display: flex; justify-content: center; gap: 24px; margin-top: 16px;">
        <div style="width: 52px; height: 52px; background: #E0E0E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #666;">◀</div>
        <div style="width: 52px; height: 52px; background: #4CAF50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff;">🔊</div>
        <div style="width: 52px; height: 52px; background: #2196F3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff;">🎤</div>
        <div style="width: 52px; height: 52px; background: #E0E0E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #666;">▶</div>
      </div>

      <!-- 进度点 -->
      <div style="display: flex; justify-content: center; gap: 6px; margin-top: 16px;">
        <div style="width: 8px; height: 8px; background: #4CAF50; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #4CAF50; border-radius: 50%;"></div>
        <div style="width: 10px; height: 10px; background: #E91E63; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #ddd; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #ddd; border-radius: 50%;"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:12px;margin-top:16px;">
    <div style="flex:1;background:#E8F5E9;border-radius:12px;padding:12px;text-align:center;">
      <div style="font-size:36px;font-weight:bold;color:#2E7D32;">92</div>
      <div style="font-size:12px;color:#2E7D32;">发音评测</div>
      <div style="margin-top:4px;">
        <span style="background:#4CAF50;color:#fff;padding:2px 8px;border-radius:8px;font-size:11px;">/s/ ✅</span>
        <span style="background:#4CAF50;color:#fff;padding:2px 8px;border-radius:8px;font-size:11px;">/iː/ ✅</span>
      </div>
    </div>
    <div style="flex:1;background:#FFF3E0;border-radius:12px;padding:12px;text-align:center;">
      <div style="font-size:36px;font-weight:bold;color:#E65100;">65</div>
      <div style="font-size:12px;color:#E65100;">发音评测</div>
      <div style="margin-top:4px;">
        <span style="background:#4CAF50;color:#fff;padding:2px 8px;border-radius:8px;font-size:11px;">/k/ ✅</span>
        <span style="background:#FF9800;color:#fff;padding:2px 8px;border-radius:8px;font-size:11px;">/æ/ ⚠️</span>
      </div>
    </div>
  </div>
</div>

<div style="border-top: 1px solid #ddd; margin: 24px 0;"></div>
<p>字母认读的滑动卡牌设计，上面左右滑动切换字母，点🎤进入跟读评测。满意的话我继续设计音标认读和单词跟读模块。</p>
