<div class="section">

  <div class="mockup">
    <div class="mockup-header">🤖 AI English Teacher · 幼儿园</div>
    <div class="mockup-body" style="padding: 24px; text-align: center;">
      <!-- 开始前 -->
      <div style="padding: 40px 20px;">
        <div style="width:100px;height:100px;background:linear-gradient(135deg,#42A5F5,#1565C0);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto;box-shadow:0 4px 20px rgba(33,150,243,0.3);">🤖</div>

          <div style="display:flex;gap:12px;margin-bottom:14px;">

            </div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:14px;flex-direction:row-reverse;">
            <div style="width:40px;height:40px;background:#FF9800;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;">👤</div>
            <div style="background:#FFF3E0;border-radius:14px 0 14px 14px;padding:12px 16px;max-width:75%;">
              <div style="font-size:18px;line-height:1.5;">Hello!</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:14px;">
            <div style="width:40px;height:40px;background:linear-gradient(135deg,#42A5F5,#1565C0);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;">🤖</div>
            <div style="background:#E3F2FD;border-radius:0 14px 14px 14px;padding:12px 16px;max-width:75%;">
              <div style="font-size:18px;line-height:1.5;">What's your name? 😊</div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;border-top:1px solid #eee;padding-top:12px;">
          <div style="flex:1;background:#F5F5F5;border-radius:24px;padding:12px 16px;font-size:16px;color:#999;text-align:left;">Say something...</div>
          <div style="width:50px;height:50px;background:#2196F3;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;">🎤</div>
          <div style="width:50px;height:50px;background:#4CAF50;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;">➤</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="border-top: 1px solid #ddd; margin: 24px 0;"></div>
